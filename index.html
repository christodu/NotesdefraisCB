<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notes de Frais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;min-height:100vh;padding-bottom:80px}
  h1{font-size:22px;font-weight:800}
  .header{background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:22px 20px 28px;color:white}
  .header p{margin-top:6px;opacity:.75;font-size:13px}
  .tabs{display:flex;gap:8px;padding:16px 16px 0}
  .tab{flex:1;padding:10px 8px;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;background:white;color:#64748b;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .tab.active{background:#2563eb;color:white;box-shadow:0 2px 8px rgba(37,99,235,.3)}
  .body{padding:16px}
  .zone{border:2px dashed #cbd5e1;border-radius:16px;padding:36px 24px;text-align:center;background:white;cursor:pointer;transition:all .3s;margin-bottom:16px}
  .zone:hover{border-color:#93c5fd;background:#eff6ff}
  .zone.processing{border-color:#93c5fd;background:#eff6ff;cursor:default}
  .zone .icon{font-size:52px;margin-bottom:10px}
  .zone h2{color:#1e40af;font-size:18px;margin-bottom:6px}
  .zone p{color:#64748b;font-size:13px;line-height:1.5}
  .btn{width:100%;padding:13px;color:white;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-green{background:#16a34a;box-shadow:0 2px 8px #16a34a55}
  .btn-blue{background:#2563eb;box-shadow:0 2px 8px #2563eb55}
  .btn-red{background:#dc2626;box-shadow:0 2px 8px #dc262655}
  .tip{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 14px;font-size:13px;color:#15803d;margin-bottom:16px}
  .empty{text-align:center;padding:48px 0;color:#94a3b8}
  .empty .icon{font-size:52px;margin-bottom:12px}
  .month-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:white;border-radius:12px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #e2e8f0}
  .month-bar span{font-weight:700;color:#1e40af;font-size:15px}
  .month-total{font-weight:800;color:#0f172a;font-size:15px}
  .card{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;gap:11px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .card img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid #e2e8f0}
  .card-info{flex:1;min-width:0}
  .card-info h3{font-size:15px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-info .date{font-size:12px;color:#64748b;margin:3px 0 5px}
  .badge{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
  .card-info .desc{font-size:12px;color:#475569;margin-top:5px;line-height:1.4}
  .card-right{text-align:right;flex-shrink:0}
  .card-right .amount{font-weight:800;font-size:16px;color:#1e40af}
  .card-right .tva{font-size:11px;color:#94a3b8;margin:2px 0 6px}
  .del-btn{background:#fee2e2;border:none;border-radius:6px;padding:3px 8px;color:#ef4444;font-size:11px;font-weight:600;cursor:pointer}
  .notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:white;padding:10px 20px;border-radius:10px;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:14px;font-weight:600;white-space:nowrap;transition:all .3s}
  .notif.ok{background:#22c55e}
  .notif.err{background:#ef4444}
  /* API Key section */
  .api-section{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:16px}
  .api-section h3{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:8px}
  .api-row{display:flex;gap:8px}
  .api-row input{flex:1;padding:9px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:13px;outline:none}
  .api-row input:focus{border-color:#2563eb}
  .api-row button{padding:9px 14px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .api-ok{font-size:12px;color:#16a34a;margin-top:6px;font-weight:600}
  .api-missing{font-size:12px;color:#dc2626;margin-top:6px;font-weight:600}
  /* Progress bar */
  .prog-wrap{margin-top:14px;height:4px;background:#dbeafe;border-radius:4px;overflow:hidden}
  .prog-bar{height:100%;background:#2563eb;border-radius:4px;animation:progress 1.5s ease-in-out infinite}
  @keyframes progress{0%{width:10%;margin-left:0}50%{width:60%}100%{width:10%;margin-left:90%}}
  .pulse{animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .preview-img{border-radius:14px;overflow:hidden;margin-bottom:14px;border:1px solid #e2e8f0}
  .preview-img img{width:100%;max-height:260px;object-fit:contain;background:#f8fafc;display:block}
</style>
</head>
<body>

<div id="notif" style="display:none" class="notif"></div>

<div class="header">
  <h1>🧾 Notes de Frais</h1>
  <p id="header-sub">Chargement…</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('capture')">📷 Ajouter</button>
  <button class="tab" onclick="switchTab('list')">📑 Mes notes (<span id="count">0</span>)</button>
</div>

<div class="body">

  <!-- TAB CAPTURE -->
  <div id="tab-capture">
    <div class="api-section">
      <h3>🔑 Clé API Anthropic</h3>
      <div class="api-row">
        <input type="password" id="api-input" placeholder="sk-ant-..." />
        <button onclick="saveKey()">Enregistrer</button>
      </div>
      <div id="api-status"></div>
    </div>

    <div class="zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon" id="zone-icon">📸</div>
      <h2 id="zone-title">Photographier un reçu</h2>
      <p id="zone-desc">Appuyez pour utiliser l'appareil photo<br/>ou importer une image depuis votre galerie</p>
      <div class="prog-wrap" id="prog-wrap" style="display:none"><div class="prog-bar"></div></div>
    </div>

    <div class="preview-img" id="preview-wrap" style="display:none">
      <img id="preview-img" src="" alt="Reçu"/>
    </div>

    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)"/>

    <div class="tip">💡 <strong>Astuce :</strong> Prenez la photo bien à plat, avec une bonne lumière pour une meilleure reconnaissance.</div>
  </div>

  <!-- TAB LIST -->
  <div id="tab-list" style="display:none">
    <button class="btn btn-green" onclick="exportXLSX()">📊 Exporter en Excel (.xlsx)</button>
    <button class="btn btn-red" onclick="clearAll()">🗑️ Tout effacer</button>
    <div id="list-content"></div>
  </div>

</div>

<script>
const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const CAT_ICONS = {Transport:"🚗",Repas:"🍽️",Hébergement:"🏨",Fournitures:"📦",Communication:"📱",Formation:"📚",Divertissement:"🎭",Autre:"📌"};
let expenses = [], processing = false, expandedMonths = {};

// --- INIT ---
function init() {
  expenses = JSON.parse(localStorage.getItem("ndf-expenses") || "[]");
  const key = localStorage.getItem("ndf-apikey") || "";
  if (key) {
    document.getElementById("api-input").value = key;
    document.getElementById("api-status").innerHTML = '<span class="api-ok">✅ Clé enregistrée</span>';
  }
  refreshUI();
}

function saveKey() {
  const k = document.getElementById("api-input").value.trim();
  if (!k.startsWith("sk-ant-")) {
    document.getElementById("api-status").innerHTML = '<span class="api-missing">❌ La clé doit commencer par sk-ant-</span>';
    return;
  }
  localStorage.setItem("ndf-apikey", k);
  document.getElementById("api-status").innerHTML = '<span class="api-ok">✅ Clé enregistrée avec succès</span>';
  notify("🔑 Clé API sauvegardée !");
}

// --- TABS ---
function switchTab(t) {
  document.getElementById("tab-capture").style.display = t==="capture" ? "" : "none";
  document.getElementById("tab-list").style.display   = t==="list"    ? "" : "none";
  document.querySelectorAll(".tab").forEach((el,i) => el.classList.toggle("active", (i===0 && t==="capture") || (i===1 && t==="list")));
  if (t==="list") renderList();
}

// --- FILE HANDLING ---
function handleFile(e) {
  const file = e.target.files[0];
  if (!file || processing) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const full = ev.target.result;
    const base64 = full.split(",")[1];
    document.getElementById("preview-wrap").style.display = "";
    document.getElementById("preview-img").src = full;
    await analyze(base64, file.type, full);
  };
  reader.readAsDataURL(file);
  e.target.value = "";
}

// --- ANALYZE ---
async function analyze(base64, mediaType, thumbFull) {
  const apiKey = localStorage.getItem("ndf-apikey");
  if (!apiKey) { notify("❌ Veuillez d'abord enregistrer votre clé API", "err"); return; }
  processing = true;
  setZoneProcessing(true);
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
            { type: "text", text: `Analyse ce reçu/note de frais et retourne UNIQUEMENT un objet JSON (sans markdown, sans backticks) avec ces champs:\n{\n  "date": "YYYY-MM-DD",\n  "vendeur": "nom du commerce",\n  "montant_ttc": 0.00,\n  "tva": 0.00,\n  "devise": "EUR",\n  "categorie": "Transport|Repas|Hébergement|Fournitures|Communication|Formation|Divertissement|Autre",\n  "description": "courte description"\n}\nSi une valeur est illisible ou absente, utilise null. Date du jour si non trouvée: ${new Date().toISOString().split("T")[0]}` }
          ]
        }]
      })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    const txt = (d.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
    const p = JSON.parse(txt);
    const entry = {
      id: Date.now().toString(),
      date: p.date || new Date().toISOString().split("T")[0],
      vendeur: p.vendeur || "Inconnu",
      montant_ttc: parseFloat(p.montant_ttc)||0,
      tva: parseFloat(p.tva)||0,
      devise: p.devise||"EUR",
      categorie: p.categorie||"Autre",
      description: p.description||"",
      thumb: thumbFull
    };
    expenses.push(entry);
    localStorage.setItem("ndf-expenses", JSON.stringify(expenses));
    const dd = new Date(entry.date);
    const mk = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}`;
    expandedMonths[mk] = true;
    refreshUI();
    switchTab("list");
    notify(`✅ ${entry.vendeur} — ${entry.montant_ttc.toFixed(2)} ${entry.devise} ajouté !`);
  } catch(err) {
    console.error(err);
    notify("❌ Erreur : " + (err.message||"Analyse impossible"), "err");
  }
  processing = false;
  setZoneProcessing(false);
}

function setZoneProcessing(on) {
  const z = document.getElementById("drop-zone");
  z.className = "zone" + (on?" processing":"");
  document.getElementById("zone-icon").className = on?"icon pulse":"icon";
  document.getElementById("zone-icon").textContent = on?"🔍":"📸";
  document.getElementById("zone-title").textContent = on?"Analyse en cours…":"Photographier un reçu";
  document.getElementById("zone-desc").textContent = on?"L'IA extrait les informations du reçu":"Appuyez pour utiliser l'appareil photo\nou importer une image depuis votre galerie";
  document.getElementById("prog-wrap").style.display = on?"":"none";
}

// --- RENDER ---
function refreshUI() {
  const tot = expenses.reduce((s,e)=>s+(e.montant_ttc||0),0);
  document.getElementById("header-sub").textContent = `${expenses.length} note${expenses.length!==1?"s":""} enregistrée${expenses.length!==1?"s":""} • Total : ${tot.toFixed(2)} €`;
  document.getElementById("count").textContent = expenses.length;
}

function renderList() {
  const c = document.getElementById("list-content");
  if (!expenses.length) {
    c.innerHTML = `<div class="empty"><div class="icon">🗂️</div><p style="font-size:16px;font-weight:600;margin-bottom:6px">Aucune note de frais</p><p style="font-size:13px">Commencez par photographier un reçu</p></div>`;
    return;
  }
  const grouped = {};
  expenses.forEach(ex => {
    const d = new Date(ex.date);
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const lbl = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (!grouped[mk]) grouped[mk] = {lbl, items:[], total:0};
    grouped[mk].items.push(ex);
    grouped[mk].total += ex.montant_ttc||0;
  });
  const html = Object.keys(grouped).sort().reverse().map(mk => {
    const {lbl,items,total} = grouped[mk];
    const open = expandedMonths[mk] !== false;
    const cards = items.sort((a,b)=>b.date.localeCompare(a.date)).map(ex => {
      const ht = (ex.montant_ttc||0)-(ex.tva||0);
      return `<div class="card">
        ${ex.thumb ? `<img src="${ex.thumb}" alt=""/>` : ""}
        <div class="card-info">
          <h3>${esc(ex.vendeur)}</h3>
          <div class="date">${ex.date}</div>
          <span class="badge">${CAT_ICONS[ex.categorie]||"📌"} ${esc(ex.categorie)}</span>
          ${ex.description ? `<div class="desc">${esc(ex.description)}</div>` : ""}
        </div>
        <div class="card-right">
          <div class="amount">${(ex.montant_ttc||0).toFixed(2)} ${esc(ex.devise)}</div>
          ${ex.tva>0 ? `<div class="tva">TVA ${ex.tva.toFixed(2)} €</div>` : ""}
          <button class="del-btn" onclick="delExpense('${ex.id}')">🗑️ Supprimer</button>
        </div>
      </div>`;
    }).join("");
    return `
      <div class="month-bar" onclick="toggleMonth('${mk}')">
        <span>📅 ${lbl}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="month-total">${total.toFixed(2)} €</span>
          <span style="color:#94a3b8;font-size:12px">${open?"▲":"▼"}</span>
        </div>
      </div>
      <div id="month-${mk}" style="display:${open?'':'none'}">${cards}</div>`;
  }).join("");
  c.innerHTML = html;
}

function toggleMonth(mk) {
  expandedMonths[mk] = !expandedMonths[mk];
  const el = document.getElementById("month-"+mk);
  if (el) el.style.display = expandedMonths[mk] ? "" : "none";
  // update arrow
  renderList();
}

function delExpense(id) {
  expenses = expenses.filter(e=>e.id!==id);
  localStorage.setItem("ndf-expenses", JSON.stringify(expenses));
  refreshUI(); renderList();
  notify("🗑️ Note supprimée");
}

function clearAll() {
  if (!confirm("Effacer toutes les notes de frais ? Cette action est irréversible.")) return;
  expenses = [];
  localStorage.setItem("ndf-expenses", JSON.stringify(expenses));
  refreshUI(); renderList();
  notify("🗑️ Toutes les notes ont été supprimées");
}

// --- EXPORT ---
function exportXLSX() {
  if (!expenses.length) { notify("Aucune donnée à exporter","err"); return; }
  const wb = XLSX.utils.book_new();
  const grouped = {};
  expenses.forEach(ex => {
    const d = new Date(ex.date);
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const lbl = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (!grouped[mk]) grouped[mk] = {lbl, items:[]};
    grouped[mk].items.push(ex);
  });
  Object.keys(grouped).sort().forEach(mk => {
    const {lbl,items} = grouped[mk];
    const rows = [["Date","Fournisseur","Description","Catégorie","Montant HT","TVA","Montant TTC","Devise"]];
    let sHT=0, sTVA=0, sTTC=0;
    items.sort((a,b)=>a.date.localeCompare(b.date)).forEach(ex => {
      const tva=ex.tva||0, ttc=ex.montant_ttc||0, ht=ttc-tva;
      sHT+=ht; sTVA+=tva; sTTC+=ttc;
      rows.push([ex.date, ex.vendeur, ex.description, ex.categorie, +ht.toFixed(2), +tva.toFixed(2), +ttc.toFixed(2), ex.devise||"EUR"]);
    });
    rows.push([]);
    rows.push(["TOTAL","","","",+sHT.toFixed(2),+sTVA.toFixed(2),+sTTC.toFixed(2),""]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:12},{wch:28},{wch:35},{wch:16},{wch:13},{wch:10},{wch:14},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, lbl.substring(0,31));
  });
  XLSX.writeFile(wb, `Notes_Frais_${new Date().getFullYear()}.xlsx`);
  notify("📊 Fichier Excel téléchargé !");
}

// --- UTILS ---
function notify(msg, type="ok") {
  const n = document.getElementById("notif");
  n.textContent = msg;
  n.className = "notif " + type;
  n.style.display = "";
  clearTimeout(n._t);
  n._t = setTimeout(()=>n.style.display="none", 3500);
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

init();
</script>
</body>
</html>
